name: update benfica ics

on:
  schedule:
    - cron: "0 */12 * * *" # every 12 hours (UTC)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download ics
        run: |
          set -euo pipefail

          URL="https://www.zerozero.pt/agenda_ics.php?id_equipa=4&code=97c4e695460023a46f2200249c73d1c257e0fee9850bf&matches=1&imp"

          # fetch with basic browser-like headers
          curl -L --fail \
            -H "User-Agent: Mozilla/5.0" \
            -H "Accept: text/calendar,*/*" \
            -H "Referer: https://www.zerozero.pt/" \
            "$URL" \
            -o benfica.ics.new

          # basic validation
          if ! grep -q "BEGIN:VCALENDAR" benfica.ics.new; then
            echo "downloaded content is not an ICS (missing BEGIN:VCALENDAR)"
            head -n 50 benfica.ics.new || true
            exit 1
          fi

          # normalize line endings to \n
          tr -d '\r' < benfica.ics.new > benfica.ics
          rm -f benfica.ics.new

      - name: commit if changed
        run: |
          set -euo pipefail
          if git status --porcelain | grep -q "^ M benfica.ics\|^?? benfica.ics"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add benfica.ics
            git commit -m "update benfica.ics"
            git push
          else
            echo "no changes"
          fi
